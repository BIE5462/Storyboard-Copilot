<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storyboard Copilot</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0f1115;
        color: #e5e7eb;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      }

      .splash {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 25% 15%, #1f252e 0%, #12161b 48%, #0b0e12 100%);
      }

      .panel {
        width: 280px;
        text-align: center;
      }

      .brand {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        opacity: 0.95;
      }

      .sub {
        margin-top: 10px;
        font-size: 12px;
        color: #94a3b8;
      }

      .bar {
        margin-top: 16px;
        width: 100%;
        height: 4px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.22);
        overflow: hidden;
      }

      .bar::before {
        content: "";
        display: block;
        width: 35%;
        height: 100%;
        background: linear-gradient(90deg, rgba(59, 130, 246, 0.7), rgba(56, 189, 248, 0.9));
        border-radius: 999px;
        animation: loading 1.1s ease-in-out infinite;
      }

      @keyframes loading {
        0% { transform: translateX(-140%); }
        100% { transform: translateX(340%); }
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="panel">
        <div class="brand">Storyboard Copilot</div>
        <div class="sub">正在启动...</div>
        <div class="bar"></div>
      </div>
    </div>
  </body>
</html>
